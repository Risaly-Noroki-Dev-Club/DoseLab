<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="DoseLab 本地优先用药记录与浓度曲线工具。">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="DoseLab">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>DoseLab</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0175C2">
  <style>
    body {
      margin: 0;
      background: #f8fbff;
      color: #17212b;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #loading {
      min-height: 100vh;
      display: grid;
      place-items: center;
      gap: 12px;
    }

    #loading strong {
      font-size: 22px;
      letter-spacing: 0.02em;
    }

    #loading span {
      color: #5d6b7a;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="loading">
    <div>
      <strong>DoseLab</strong><br>
      <span>正在加载本地用药记录工具...</span>
    </div>
  </div>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="sql-wasm.js"></script>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('/service_worker.js', {
          scope: '/',
        }).then(function (reg) {
          console.log('DoseLab SW registered:', reg.scope);
        }).catch(function (err) {
          console.warn('DoseLab SW failed:', err);
        });
      });
    }
  </script>
</body>
</html>
