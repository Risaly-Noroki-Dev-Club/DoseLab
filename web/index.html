<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>DoseLab — Medication PK Lab</title>
<style>
:root {
  --bg: #121212;
  --surface: #1e1e1e;
  --surface2: #2a2a2a;
  --primary: #90caf9;
  --on-surface: #e0e0e0;
  --on-surface-dim: #a0a0a0;
  --error: #cf6679;
  --border: #333;
  --radius: 8px;
  font-family: 'Segoe UI', 'Roboto', 'Noto Sans SC', sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--on-surface); min-height:100vh; min-height:100dvh; }

/* ── Top bar ────────────────────────────── */
.topbar {
  background:var(--surface); padding:8px 12px;
  display:flex; align-items:center; gap:10px;
  border-bottom:1px solid var(--border);
  position:sticky; top:0; z-index:20; flex-wrap:wrap;
}
.topbar h1 { font-size:1rem; font-weight:700; color:var(--primary); white-space:nowrap; }
.topbar .search-row {
  display:flex; align-items:center; gap:8px; flex:1; min-width:0;
}
.topbar input {
  flex:1; background:var(--surface2); border:1px solid var(--border);
  color:var(--on-surface); padding:8px 12px; border-radius:var(--radius);
  font-size:0.9rem; outline:none; min-width:120px;
}
.topbar input:focus { border-color:var(--primary); }

.zh-hint {
  background:rgba(76,175,80,0.18); color:#81c784;
  border:1px solid rgba(76,175,80,0.25);
  padding:3px 8px; border-radius:12px; font-size:0.72rem;
  white-space:nowrap; display:none; align-items:center; gap:3px;
  max-width:200px; overflow:hidden; text-overflow:ellipsis;
}
.zh-hint.visible { display:inline-flex; }
.zh-hint .arrow { color:var(--on-surface-dim); font-size:0.65rem; }

.lang-btn {
  background:var(--surface2); border:1px solid var(--border);
  color:var(--on-surface-dim); padding:5px 10px; border-radius:6px;
  font-size:0.78rem; cursor:pointer; white-space:nowrap; flex-shrink:0;
}
.lang-btn:hover { background:var(--border); color:var(--on-surface); }

/* ── Tab bar (mobile only) ──────────────── */
.tab-bar {
  display:none; background:var(--surface);
  border-bottom:1px solid var(--border);
  position:sticky; top:52px; z-index:15;
}
.tab-btn {
  flex:1; background:none; border:none; color:var(--on-surface-dim);
  padding:10px 0; font-size:0.82rem; cursor:pointer;
  border-bottom:2px solid transparent; transition:all 0.15s;
  font-family:inherit; -webkit-tap-highlight-color:transparent;
}
.tab-btn.active { color:var(--primary); border-bottom-color:var(--primary); }

/* ── Layout ─────────────────────────────── */
.layout { display:flex; height:calc(100vh - 52px); height:calc(100dvh - 52px); }
.panel { overflow-y:auto; -webkit-overflow-scrolling:touch; }
.panel-left { width:380px; border-right:1px solid var(--border); flex-shrink:0; }
.right-col { flex:1; display:flex; flex-direction:column; min-width:0; }

/* Tab panels (mobile) */
.tab-panel { display:block; }
.tab-panel.hidden { display:none; }

.section-title {
  padding:12px 14px 6px;
  font-size:0.7rem; text-transform:uppercase;
  letter-spacing:0.06em; color:var(--on-surface-dim);
  position:sticky; top:0; background:var(--bg); z-index:1;
}

/* ── Result items ───────────────────────── */
.result-item {
  padding:12px 14px; cursor:pointer; border-bottom:1px solid var(--border);
  transition:background 0.12s; -webkit-tap-highlight-color:transparent;
}
.result-item:active { background:var(--surface2); }
.result-item.active { background:var(--surface2); border-left:3px solid var(--primary); padding-left:11px; }
.result-item .brand { font-weight:600; font-size:0.92rem; }
.result-item .generic, .result-item .strength { font-size:0.8rem; color:var(--on-surface-dim); }
.result-item .meta-row {
  display:flex; gap:10px; margin-top:2px; font-size:0.72rem;
  color:var(--on-surface-dim); flex-wrap:wrap;
}

.empty-state {
  padding:48px 18px; text-align:center; color:var(--on-surface-dim);
}
.empty-state p { margin-top:6px; font-size:0.88rem; }

/* ── Detail section ─────────────────────── */
.detail-section {
  padding:14px 16px; border-bottom:1px solid var(--border);
}
.detail-section h3 {
  font-size:0.95rem; color:var(--primary); margin-bottom:10px;
}
.detail-row {
  display:flex; justify-content:space-between; padding:5px 0;
  font-size:0.85rem; min-height:28px; align-items:center;
}
.detail-row .label { color:var(--on-surface-dim); flex-shrink:0; margin-right:12px; }
.detail-row .value {
  font-weight:500; text-align:right; overflow-wrap:break-word; word-break:break-all;
}
.pk-highlight {
  background:var(--surface2); border-radius:var(--radius);
  padding:8px 12px; margin-top:8px;
}

/* ── Chart area ─────────────────────────── */
.chart-area {
  flex:1; min-height:220px; position:relative;
}
.chart-area canvas { width:100%; height:100%; display:block; }

/* ── Sim controls ───────────────────────── */
.sim-controls {
  padding:10px 14px; display:flex; gap:8px; align-items:center;
  flex-wrap:wrap; border-top:1px solid var(--border); background:var(--surface);
}
.sim-controls label {
  font-size:0.78rem; color:var(--on-surface-dim);
  display:flex; align-items:center; gap:5px; white-space:nowrap;
}
.sim-controls input[type=number] {
  width:58px; background:var(--surface2); border:1px solid var(--border);
  color:var(--on-surface); padding:6px 6px; border-radius:4px;
  font-size:0.82rem; text-align:center; font-family:inherit;
}
.sim-controls input[type=number]:focus { border-color:var(--primary); outline:none; }
.sim-controls button {
  background:var(--primary); color:#121212; border:none;
  padding:7px 16px; border-radius:6px; font-weight:600;
  font-size:0.8rem; cursor:pointer; font-family:inherit;
}
.sim-controls button:active { filter:brightness(1.1); }
.sim-cta { flex:1; display:flex; justify-content:flex-end; }
.sim-half { font-size:0.72rem; color:var(--on-surface-dim); }
.sim-controls .spacer { flex:1 1 0; min-width:0; }

/* ── Meta footer ────────────────────────── */
.meta-footer {
  padding:8px 14px; border-top:1px solid var(--border);
  font-size:0.66rem; color:var(--on-surface-dim);
  display:flex; justify-content:space-between; flex-wrap:wrap; gap:6px;
  background:var(--surface);
}
.meta-footer span { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.meta-footer .source-badge { margin-left:auto; }

.source-badge {
  display:inline-flex; align-items:center; gap:3px;
  background:var(--surface2); padding:2px 7px; border-radius:4px;
  font-size:0.66rem; color:var(--on-surface-dim);
}

.spinner { width:18px; height:18px; border:2px solid var(--surface2); border-top-color:var(--primary); border-radius:50%; animation:spin 0.6s linear infinite; margin:0 auto 6px; }
@keyframes spin { to { transform:rotate(360deg); } }

/* ── Responsive ──────────────────────────── */
@media (max-width:749px) {
  .tab-bar { display:flex; }
  .layout { display:block; height:auto; }
  .right-col { display:contents; }
  .panel { height:auto !important; max-height:none !important; overflow:visible; }
  .panel-left, .panel-right { width:100% !important; max-height:none !important; border:none !important; }
  .panel-left { min-height:60vh; }
  .chart-area { height:60vh; height:60dvh; min-height:280px; }
  .topbar { padding:8px 10px; gap:6px; }
  .topbar h1 { font-size:1.1rem; }
  .topbar .search-row { flex:1 1 100%; order:3; }
  .topbar input { font-size:1rem; padding:10px 12px; } /* 16px to prevent iOS zoom */
  .lang-btn { font-size:0.85rem; padding:6px 12px; }
  .detail-section { padding:12px; }
  .detail-section h3 { font-size:1rem; }
  .detail-row { font-size:0.9rem; min-height:32px; }
  .result-item { padding:14px 12px; }
  .result-item .brand { font-size:0.95rem; }
  .result-item .generic { font-size:0.85rem; }
  .result-item .meta-row { font-size:0.75rem; }
  .sim-controls { padding:8px 10px; gap:6px; }
  .sim-controls label { font-size:0.8rem; }
  .sim-controls input[type=number] { width:54px; padding:8px 4px; font-size:0.9rem; }
  .sim-controls button { padding:9px 14px; font-size:0.85rem; }
}

@media (min-width:750px) {
  .tab-panel.hidden { display:block !important; }
  .topbar { padding:10px 20px; }
  .topbar h1 { font-size:1.15rem; }
  .result-item:hover { background:var(--surface2); }
}

/* Desktop fine-tuning */
@media (min-width:1100px) {
  .topbar { padding:12px 24px; }
  .panel-left { width:400px; }
}
</style>
</head>
<body>

<div class="topbar">
  <h1>DoseLab</h1>
  <span class="zh-hint" id="zhHint"><span class="arrow">→</span><span id="zhHintText"></span></span>
  <button class="lang-btn" id="langBtn" onclick="toggleLang()" title="Switch language">中</button>
  <div class="search-row">
    <input type="text" id="searchInput" autofocus>
  </div>
</div>

<div class="tab-bar" id="tabBar">
  <button class="tab-btn active" data-tab="list" id="tabList">List</button>
  <button class="tab-btn" data-tab="detail" id="tabDetail">Detail</button>
  <button class="tab-btn" data-tab="chart" id="tabChart">Chart</button>
</div>

<div class="layout" id="layoutRoot">
  <div class="panel panel-left tab-panel" id="panelList">
    <div class="empty-state">
      <div style="font-size:2rem; opacity:0.3;">🔬</div>
      <p id="emptyHint"></p>
    </div>
  </div>
  <div class="right-col">
    <div class="panel tab-panel" id="panelDetail">
      <div class="detail-section" id="detailPanel">
        <div class="empty-state"><p id="detailHint"></p></div>
      </div>
    </div>
    <div class="panel chart-area tab-panel" id="panelChart">
      <canvas id="pkChart"></canvas>
    </div>
    <div class="sim-controls" id="simControls"></div>
    <div class="meta-footer" id="metaFooter"></div>
  </div>
</div>

<script>
const I18N = {
  en: {
    search: 'Search medications (e.g. sertraline, ibuprofen)...',
    emptyHint: 'Search for a medication to begin',
    detailHint: 'Select a medication to view details',
    noResults: 'No results found',
    searching: 'Searching…',
    medications: 'Medications',
    generic: 'Generic',
    strength: 'Strength',
    dosageForm: 'Dosage form',
    route: 'Route',
    ndc: 'NDC',
    manufacturer: 'Manufacturer',
    category: 'Category',
    halfLife: 'Half‑life',
    tmax: 'T<sub>max</sub>',
    steadyState: 'Steady state',
    pkData: 'PK data',
    loading: 'Loading…',
    dose: 'Dose',
    mgEvery: 'mg every',
    hFor: 'h for',
    h: 'h',
    refresh: 'Refresh',
    therapeuticWindow: 'therapeutic window',
    peak: 'peak',
    doses: 'doses',
    fdaNdc: 'FDA NDC',
    label: 'Label',
    disclaimer: 'Reference only — not medical advice',
    error: 'Error',
    langTitle: 'Switch language',
    langLabel: '中',
    tabList: 'List',
    tabDetail: 'Detail',
    tabChart: 'Chart',
  },
  zh: {
    search: '搜索药品（如 sertraline, ibuprofen）…',
    emptyHint: '搜索药品以开始',
    detailHint: '选择一个药品查看详情',
    noResults: '未找到结果',
    searching: '搜索中…',
    medications: '药品列表',
    generic: '通用名',
    strength: '规格',
    dosageForm: '剂型',
    route: '给药途径',
    ndc: 'NDC 编码',
    manufacturer: '生产厂商',
    category: '上市类别',
    halfLife: '半衰期',
    tmax: '达峰时间 T<sub>max</sub>',
    steadyState: '达稳态',
    pkData: 'PK 数据',
    loading: '加载中…',
    dose: '剂量',
    mgEvery: 'mg 每',
    hFor: 'h 持续',
    h: 'h',
    refresh: '刷新',
    therapeuticWindow: '治疗窗',
    peak: '峰浓度',
    doses: '剂',
    fdaNdc: 'FDA NDC',
    label: '标签',
    disclaimer: '仅供参考 — 非医疗建议',
    error: '错误',
    langTitle: '切换语言',
    langLabel: 'EN',
    tabList: '列表',
    tabDetail: '详情',
    tabChart: '图表',
  }
};

let locale = 'en';
if (typeof navigator !== 'undefined' && navigator.language?.startsWith('zh')) locale = 'zh';
const tcache = {};

function t(key) {
  tcache[key] ??= {};
  if (!tcache[key][locale]) {
    tcache[key][locale] = (I18N[locale]?.[key] ?? I18N.en[key] ?? key)
      .replace(/&lt;/g,'<').replace(/&gt;/g,'>');
  }
  return tcache[key][locale];
}

function toggleLang() {
  locale = locale === 'en' ? 'zh' : 'en';
  updateAllTexts();
  localStorage?.setItem('doselab-lang', locale);
}
if (typeof localStorage !== 'undefined' && localStorage.getItem('doselab-lang')) {
  locale = localStorage.getItem('doselab-lang');
}

function updateAllTexts() {
  const inp = document.getElementById('searchInput');
  inp.placeholder = t('search');
  document.getElementById('langBtn').textContent = t('langLabel');
  document.getElementById('langBtn').title = t('langTitle');
  document.getElementById('tabList').textContent = t('tabList');
  document.getElementById('tabDetail').textContent = t('tabDetail');
  document.getElementById('tabChart').textContent = t('tabChart');
  document.documentElement.lang = locale;

  const results = window._searchResults;
  if (results) {
    renderResults(results, window._searchMeta);
  } else {
    document.getElementById('emptyHint').textContent = t('emptyHint');
  }
  if (selectedMed) {
    renderDetail(selectedMed);
  } else {
    document.getElementById('detailHint').textContent = t('detailHint');
  }
  renderControls();
  if (document.getElementById('panelChart').offsetParent !== null) drawChart();
}

/* ── Mobile tab switching ────────────────── */
function isMobile() { return window.innerWidth < 750; }

let mobileTab = 'list';

function switchTab(name) {
  mobileTab = name;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === name));
  if (!isMobile()) {
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('hidden'));
    return;
  }
  const panels = {
    list: document.getElementById('panelList'),
    detail: document.getElementById('panelDetail'),
    chart: document.getElementById('panelChart'),
  };
  for (const [key, el] of Object.entries(panels)) {
    if (el) el.classList.toggle('hidden', key !== name);
  }
  if (name === 'chart') setTimeout(drawChart, 100);
}

document.getElementById('tabBar').addEventListener('click', e => {
  const btn = e.target.closest('.tab-btn');
  if (btn) switchTab(btn.dataset.tab);
});

/* ── FDA API ─────────────────────────────── */
const FDA_BASE = 'https://api.fda.gov';

let selectedMed = null;
let pkParams = null;
let simHours = 72, doseMg = 50, intervalHours = 24;
let schedule = [];

const CJK_RE = /[\u4e00-\u9fff\u3400-\u4dbf\uf900-\ufaff]/;
let zhDrugMap = [];

function hasCJK(s) { return CJK_RE.test(s); }

function matchZhToEn(query) {
  if (!query || !zhDrugMap.length) return null;
  const q = query.toLowerCase();
  for (const entry of zhDrugMap) {
    if (!entry.zh) continue;
    for (const name of entry.zh) {
      if (name.includes(q) || q.includes(name)) {
        return { en: entry.en, zh: name, category: entry.category || '' };
      }
    }
  }
  return null;
}

function showZhHint(zhName, enName) {
  const el = document.getElementById('zhHint');
  const txt = document.getElementById('zhHintText');
  if (enName) {
    txt.textContent = `${zhName} → ${enName}`;
    el.classList.add('visible');
  } else {
    el.classList.remove('visible');
  }
}

async function loadZhDrugMap() {
  try {
    const resp = await fetch('data/zh_drug_map.json');
    if (resp.ok) {
      zhDrugMap = await resp.json();
      document.getElementById('searchInput').addEventListener('input', () => {
        const q = document.getElementById('searchInput').value.trim();
        if (hasCJK(q)) {
          const match = matchZhToEn(q);
          showZhHint(match ? match.zh : '', match ? match.en : '');
        } else { showZhHint('', ''); }
      });
    }
  } catch (e) { console.warn('Failed to load Chinese drug map:', e.message); }
}

function resolveSearchTerm(query) {
  if (hasCJK(query)) {
    const match = matchZhToEn(query);
    if (match) { window._zhMatch = match; return match.en; }
    window._zhMatch = null; return query;
  }
  window._zhMatch = null; return query;
}

function apiUrl(endpoint, search, limit=20) {
  const q = search ? `search=${encodeURIComponent(search)}` : '';
  return `${FDA_BASE}/${endpoint}?${q}&limit=${limit}&skip=0`;
}

async function fdaFetch(endpoint, search, limit=20) {
  const url = apiUrl(endpoint, search, limit);
  const resp = await fetch(url);
  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    throw new Error(err.error?.message || `HTTP ${resp.status}`);
  }
  const data = await resp.json();
  return {
    results: data.results || [],
    meta: data.meta || {},
    retrieved_at: new Date().toISOString(),
    request_url: url.replace(/(api_key=)[^&]+/, '$1***'),
    endpoint, search_query: search,
  };
}

function renderResults(items, meta) {
  const el = document.getElementById('panelList');
  if (!items.length) {
    el.innerHTML = `<div class="empty-state"><p>${t('noResults')}</p></div>`;
    return;
  }
  const total = meta?.results?.total ?? items.length;
  let html = `<div class="section-title">${t('medications')} (${total})</div>`;
  items.forEach((item, i) => {
    const strength = item.active_ingredients?.map(a => a.strength).join(', ') || '';
    const route = (item.route || []).join(', ');
    const form = item.dosage_form || '';
    const active = selectedMed?.product_ndc === item.product_ndc;
    html += `<div class="result-item${active?' active':''}" onclick="selectMed(${i})">
      <div class="brand">${item.brand_name || item.generic_name}</div>
      <div class="generic">${item.generic_name || ''}</div>
      ${strength ? `<div class="strength">${strength}</div>` : ''}
      <div class="meta-row">
        <span>${form}</span><span>${route}</span><span>NDC ${item.product_ndc}</span>
      </div>
    </div>`;
  });
  el.innerHTML = html;
  window._searchResults = items;
}

window.selectMed = async function(idx) {
  const items = window._searchResults || [];
  selectedMed = items[idx];
  if (!selectedMed) return;
  renderResults(items, window._searchMeta);
  renderDetail(selectedMed);
  if (isMobile()) switchTab('detail');
  await fetchLabel(selectedMed);
};

function renderDetail(med) {
  const strength = med.active_ingredients?.map(a => a.strength).join(', ') || '—';
  const route = (med.route || []).join(', ') || '—';
  const el = document.getElementById('detailPanel');
  el.innerHTML = `
    <h3>${med.brand_name || med.generic_name}</h3>
    <div class="detail-row"><span class="label">${t('generic')}</span><span class="value">${med.generic_name || '—'}</span></div>
    <div class="detail-row"><span class="label">${t('strength')}</span><span class="value">${strength}</span></div>
    <div class="detail-row"><span class="label">${t('dosageForm')}</span><span class="value">${med.dosage_form || '—'}</span></div>
    <div class="detail-row"><span class="label">${t('route')}</span><span class="value">${route}</span></div>
    <div class="detail-row"><span class="label">${t('ndc')}</span><span class="value">${med.product_ndc}</span></div>
    <div class="detail-row"><span class="label">${t('manufacturer')}</span><span class="value">${med.labeler_name || '—'}</span></div>
    <div class="detail-row"><span class="label">${t('category')}</span><span class="value">${med.marketing_category || '—'}</span></div>
    ${pkParams ? `<div class="pk-highlight">
      <div class="detail-row"><span class="label">${t('halfLife')}</span><span class="value" style="color:var(--primary);font-weight:700;">${pkParams.half_life_hours || '—'} h</span></div>
      <div class="detail-row"><span class="label">${t('tmax')}</span><span class="value">${pkParams.tmax_hours || '—'}</span></div>
      <div class="detail-row"><span class="label">${t('steadyState')}</span><span class="value">${pkParams.steady_state || '—'}</span></div>
    </div>` : `<div class="detail-row"><span class="label" style="color:var(--on-surface-dim);">${t('pkData')}</span><span class="value" style="color:var(--on-surface-dim);">${t('loading')}</span></div>`}
  `;
}

function parsePKFromLabel(labelResult) {
  const label = (labelResult?.results || [])[0];
  if (!label) return null;
  const pk = {};
  const pkText = (label.pharmacokinetics || []).join(' ');
  const halfMatch = pkText.match(/half[- ]life[^0-9]*?(\d+[\.\d]*) to (\d+[\.\d]*)\s*h/i)
    || pkText.match(/half[- ]life[^0-9]*?about\s*(\d+[\.\d]*)\s*h/i)
    || pkText.match(/half[- ]life[^0-9]*?(\d+[\.\d]*)\s*h/i);
  if (halfMatch) {
    pk.half_life_text = halfMatch[0].trim();
    pk.half_life_hours = halfMatch[2] ? (parseFloat(halfMatch[1]) + parseFloat(halfMatch[2])) / 2 : parseFloat(halfMatch[1]);
  }
  const tmaxMatch = pkText.match(/(?:peak|maximum|C\s*max)[^0-9]*?(\d+[\.\d]*)[^0-9]*?(\d+[\.\d]*)?\s*h/i);
  if (tmaxMatch) {
    pk.tmax_text = tmaxMatch[0].trim();
    pk.tmax_hours = tmaxMatch[2] ? `${tmaxMatch[1]}–${tmaxMatch[2]} h` : `${tmaxMatch[1]} h`;
  }
  const ssMatch = pkText.match(/steady[- ]state[^.]*?(\d+[\.\d]*)[^.]*?(day|week|hour)/i);
  if (ssMatch) pk.steady_state = ssMatch[0].trim().replace(/\s+/g,' ');
  pk.label_version = label.version;
  pk.label_effective = label.effective_time;
  pk.brand_name = (label.openfda?.brand_name || [])[0];
  pk.generic_name = (label.openfda?.generic_name || [])[0];
  pk.source_label_id = label.id;
  return pk;
}

async function fetchLabel(med) {
  const searchTerm = med.brand_name_base || med.brand_name || med.generic_name;
  if (!searchTerm) return;
  try {
    const labelEnv = await fdaFetch('drug/label.json', `openfda.brand_name:"${searchTerm}"`, 1);
    pkParams = parsePKFromLabel(labelEnv);
    if (pkParams?.half_life_hours) {
      window._labelMeta = labelEnv.meta;
      window._labelUrl = labelEnv.request_url;
    }
  } catch (e) {
    console.warn('Label fetch failed:', e.message);
    pkParams = null;
  }
  renderDetail(selectedMed);
  renderControls();
  drawChart();
}

/* ── PK Simulation ────────────────────────── */
function buildDoseSchedule(hours) {
  schedule = [];
  for (let t = 0; t < hours; t += intervalHours) {
    schedule.push({ time: t, dose: doseMg });
  }
}

function concentration(t, halfLife) {
  let c = 0;
  for (const dose of schedule) {
    if (t >= dose.time) c += dose.dose * Math.pow(0.5, (t - dose.time) / halfLife);
  }
  return c;
}

function drawChart() {
  const canvas = document.getElementById('pkChart');
  const parent = canvas.parentElement;
  if (parent.offsetParent === null) return;
  const rect = parent.getBoundingClientRect();
  canvas.width = rect.width * window.devicePixelRatio;
  canvas.height = rect.height * window.devicePixelRatio;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = rect.height + 'px';

  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  const halfLife = pkParams?.half_life_hours || 26;
  buildDoseSchedule(simHours);

  const isSmall = W < 500;
  const pad = { top: 35, right: isSmall ? 16 : 30, bottom: isSmall ? 42 : 50, left: isSmall ? 44 : 60 };
  const pw = W - pad.left - pad.right;
  const ph = H - pad.top - pad.bottom;

  let maxC = doseMg;
  if (schedule.length > 0) {
    for (let t = 0; t <= simHours; t += 0.2) maxC = Math.max(maxC, concentration(t, halfLife));
  }
  const yMax = maxC * 1.15;

  function tx(t) { return pad.left + (t / simHours) * pw; }
  function ty(c) { return pad.top + (1 - c / yMax) * ph; }

  const tickH = Math.max(1, Math.floor(simHours / (isSmall ? 4 : 6)));
  ctx.strokeStyle = '#2a2a2a'; ctx.lineWidth = 1;
  ctx.fillStyle = '#888'; ctx.font = `${isSmall ? 9 : 11}px monospace`; ctx.textAlign = 'center';
  for (let i = 0; i <= simHours; i += tickH) {
    const x = tx(i);
    ctx.beginPath(); ctx.moveTo(x, pad.top); ctx.lineTo(x, H - pad.bottom); ctx.stroke();
    ctx.fillText(`${i}h`, x, H - pad.bottom + 14);
  }
  ctx.textAlign = 'right';
  for (let i = 0; i <= 4; i++) {
    const y = ty(yMax * i / 4);
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W - pad.right, y); ctx.stroke();
    ctx.fillText(`${(yMax * i / 4).toFixed(0)}`, pad.left - 5, y + 4);
  }

  if (pkParams?.half_life_hours) {
    const minT = doseMg * 0.4, maxT = doseMg * 1.2;
    ctx.fillStyle = 'rgba(76,175,80,0.10)';
    ctx.fillRect(pad.left, ty(maxT), pw, ty(minT) - ty(maxT));
    ctx.setLineDash([4,6]); ctx.strokeStyle = 'rgba(76,175,80,0.35)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(pad.left, ty(minT)); ctx.lineTo(W - pad.right, ty(minT)); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(pad.left, ty(maxT)); ctx.lineTo(W - pad.right, ty(maxT)); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = 'rgba(76,175,80,0.7)'; ctx.font = `${isSmall ? 8 : 10}px monospace`; ctx.textAlign = 'left';
    ctx.fillText(t('therapeuticWindow'), pad.left + 4, ty(maxT) - 4);
  }

  schedule.forEach(d => {
    const x = tx(d.time);
    ctx.strokeStyle = 'rgba(144,202,249,0.25)'; ctx.lineWidth = 1;
    ctx.setLineDash([2,4]);
    ctx.beginPath(); ctx.moveTo(x, pad.top); ctx.lineTo(x, H - pad.bottom); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#90caf9'; ctx.font = `${isSmall ? 8 : 10}px monospace`; ctx.textAlign = 'center';
    ctx.fillText(`${d.dose}mg`, x, H - pad.bottom + 30);
  });

  ctx.strokeStyle = '#90caf9'; ctx.lineWidth = 2.5;
  ctx.beginPath();
  for (let t = 0; t <= simHours; t += 0.3) {
    const x = tx(t), y = ty(concentration(t, halfLife));
    if (t === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.stroke();

  if (schedule.length > 0 && pkParams?.half_life_hours) {
    const lastDose = schedule[schedule.length - 1].time;
    const peakT = lastDose + (pkParams.tmax_hours ? parseFloat(pkParams.tmax_hours) : 5);
    if (peakT <= simHours) {
      const px = tx(peakT), py = ty(concentration(peakT, halfLife));
      ctx.fillStyle = '#ff9800';
      ctx.beginPath(); ctx.arc(px, py, isSmall ? 3 : 4, 0, Math.PI*2); ctx.fill();
      ctx.fillText(t('peak'), px + 7, py - 3);
    }
  }

  ctx.fillStyle = '#a0a0a0'; ctx.font = `${isSmall ? 9 : 11}px monospace`; ctx.textAlign = 'right';
  const curveLabel = (pkParams?.half_life_hours ? `t½=${pkParams.half_life_hours}h` : '') + ` · ${schedule.length}${t('doses')}`;
  ctx.fillText(curveLabel, W - pad.right - 2, pad.top - 6);

  const metaEl = document.getElementById('metaFooter');
  const ndcUp = window._searchMeta?.last_updated || '—';
  const labelUp = window._labelMeta?.last_updated || '—';
  metaEl.innerHTML = `
    <span title="${window._labelUrl || ''}">${t('fdaNdc')}: ${ndcUp}</span>
    <span title="${window._labelUrl || ''}">${t('label')}: ${labelUp}</span>
    <span class="source-badge">${t('disclaimer')}</span>
  `;
}

function renderControls() {
  const el = document.getElementById('simControls');
  el.innerHTML = `
    <label>${t('dose')}<input type="number" id="doseInput" value="${doseMg}" min="1" max="2000" onchange="updateSim()"></label>
    <label>${t('mgEvery')}<input type="number" id="intervalInput" value="${intervalHours}" min="1" max="168" onchange="updateSim()"></label>
    <label>${t('hFor')}<input type="number" id="hoursInput" value="${simHours}" min="6" max="336" onchange="updateSim()">${t('h')}</label>
    <span class="spacer"></span>
    <span class="sim-half">t½=${pkParams?.half_life_hours || 26}h</span>
    <button onclick="updateSim()">${t('refresh')}</button>
  `;
}

function updateSim() {
  doseMg = parseFloat(document.getElementById('doseInput')?.value) || doseMg;
  intervalHours = parseFloat(document.getElementById('intervalInput')?.value) || intervalHours;
  simHours = parseFloat(document.getElementById('hoursInput')?.value) || simHours;
  drawChart();
}

async function doSearch() {
  const rawQ = document.getElementById('searchInput').value.trim();
  if (!rawQ) return;
  const q = resolveSearchTerm(rawQ);
  const el = document.getElementById('panelList');
  el.innerHTML = `<div class="empty-state"><div class="spinner"></div><p>${t('searching')}</p></div>`;
  if (isMobile()) switchTab('list');
  try {
    const env = await fdaFetch('drug/ndc.json', `brand_name:"${q}"+generic_name:"${q}"`, 20);
    window._searchResults = env.results;
    window._searchMeta = env.meta;
    window._searchUrl = env.request_url;
    renderResults(env.results, env.meta);
    if (env.results.length > 0) { selectMed(0); drawChart(); }
  } catch (e) {
    el.innerHTML = `<div class="empty-state"><p style="color:var(--error);">${t('error')}: ${e.message}</p></div>`;
    console.error(e);
  }
}

document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});

let resizeTimer;
let lastWasMobile = isMobile();
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    const nowMobile = isMobile();
    if (nowMobile && !lastWasMobile) {
      switchTab(mobileTab || 'list');
    } else if (!nowMobile) {
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('hidden'));
    }
    lastWasMobile = nowMobile;
    if (document.getElementById('panelChart').offsetParent !== null) drawChart();
  }, 150);
});

loadZhDrugMap();
updateAllTexts();
renderControls();
drawChart();
</script>
