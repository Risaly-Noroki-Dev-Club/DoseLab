<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DoseLab — Medication PK Lab</title>
<style>
:root {
  --bg: #121212;
  --surface: #1e1e1e;
  --surface2: #2a2a2a;
  --primary: #90caf9;
  --on-surface: #e0e0e0;
  --on-surface-dim: #a0a0a0;
  --error: #cf6679;
  --window-safe: rgba(76,175,80,0.25);
  --window-warn: rgba(255,193,7,0.15);
  --window-toxic: rgba(244,67,54,0.2);
  --border: #333;
  font-family: 'Segoe UI', 'Roboto', 'Noto Sans SC', sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--on-surface); min-height:100vh; }
.topbar {
  background:var(--surface); padding:12px 24px;
  display:flex; align-items:center; gap:16px;
  border-bottom:1px solid var(--border);
  position:sticky; top:0; z-index:10;
}
.topbar h1 { font-size:1.2rem; font-weight:600; color:var(--primary); white-space:nowrap; }
.topbar input {
  flex:1; background:var(--surface2); border:1px solid var(--border);
  color:var(--on-surface); padding:8px 14px; border-radius:8px;
  font-size:0.95rem; outline:none; max-width:480px;
}
.topbar input:focus { border-color:var(--primary); }
.zh-hint {
  background:rgba(76,175,80,0.2); color:#81c784; border:1px solid rgba(76,175,80,0.3);
  padding:3px 10px; border-radius:12px; font-size:0.78rem; white-space:nowrap;
  display:none; align-items:center; gap:4px; max-width:320px;
  overflow:hidden; text-overflow:ellipsis;
}
.zh-hint.visible { display:inline-flex; }
.zh-hint .arrow { color:var(--on-surface-dim); font-size:0.7rem; }
.lang-btn {
  background:var(--surface2); border:1px solid var(--border);
  color:var(--on-surface-dim); padding:6px 12px; border-radius:6px;
  font-size:0.82rem; cursor:pointer; white-space:nowrap;
  transition:background 0.15s;
}
.lang-btn:hover { background:var(--border); color:var(--on-surface); }

.layout { display:flex; height:calc(100vh - 57px); }
.panel { overflow-y:auto; }
.panel-left { width:380px; border-right:1px solid var(--border); flex-shrink:0; }
.panel-right { flex:1; display:flex; flex-direction:column; }

.section-title {
  padding:14px 18px 8px;
  font-size:0.75rem; text-transform:uppercase;
  letter-spacing:0.08em; color:var(--on-surface-dim);
  position:sticky; top:0; background:var(--bg); z-index:1;
}
.result-item {
  padding:10px 18px; cursor:pointer; border-bottom:1px solid var(--border);
  transition:background 0.15s;
}
.result-item:hover { background:var(--surface2); }
.result-item.active { background:var(--surface2); border-left:3px solid var(--primary); padding-left:15px; }
.result-item .brand { font-weight:600; }
.result-item .generic, .result-item .strength { font-size:0.85rem; color:var(--on-surface-dim); }
.result-item .meta-row { display:flex; gap:12px; margin-top:2px; font-size:0.75rem; color:var(--on-surface-dim); }

.empty-state {
  padding:40px 18px; text-align:center; color:var(--on-surface-dim);
}
.empty-state p { margin-top:6px; font-size:0.9rem; }

.detail-section {
  padding:16px 24px; border-bottom:1px solid var(--border);
}
.detail-section h3 {
  font-size:0.85rem; color:var(--primary); margin-bottom:8px;
}
.detail-row {
  display:flex; justify-content:space-between; padding:4px 0;
  font-size:0.88rem;
}
.detail-row .label { color:var(--on-surface-dim); }
.detail-row .value { font-weight:500; text-align:right; max-width:60%; overflow-wrap:break-word; }

.chart-area { flex:1; min-height:300px; position:relative; }
.chart-area canvas { width:100%; height:100%; display:block; }

.sim-controls {
  padding:14px 24px; display:flex; gap:16px; align-items:center;
  flex-wrap:wrap; border-top:1px solid var(--border);
}
.sim-controls label { font-size:0.82rem; color:var(--on-surface-dim); display:flex; align-items:center; gap:6px; }
.sim-controls input[type=number] {
  width:70px; background:var(--surface2); border:1px solid var(--border);
  color:var(--on-surface); padding:4px 8px; border-radius:4px;
  font-size:0.85rem; text-align:center;
}
.sim-controls select {
  background:var(--surface2); border:1px solid var(--border);
  color:var(--on-surface); padding:4px 8px; border-radius:4px;
  font-size:0.85rem;
}
.sim-controls button {
  background:var(--primary); color:#121212; border:none;
  padding:6px 18px; border-radius:6px; font-weight:600;
  font-size:0.85rem; cursor:pointer;
}
.sim-controls button:hover { filter:brightness(1.1); }

.meta-footer {
  padding:10px 24px; border-top:1px solid var(--border);
  font-size:0.7rem; color:var(--on-surface-dim);
  display:flex; justify-content:space-between; flex-wrap:wrap; gap:4px;
}
.meta-footer span { max-width:48%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

.source-badge {
  display:inline-flex; align-items:center; gap:4px;
  background:var(--surface2); padding:2px 8px; border-radius:4px;
  font-size:0.7rem; color:var(--on-surface-dim);
}
.source-badge.stale { color:var(--error); }

.spinner { width:20px; height:20px; border:2px solid var(--surface2); border-top-color:var(--primary); border-radius:50%; animation:spin 0.6s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

@media (max-width:820px) {
  .layout { flex-direction:column; }
  .panel-left { width:100%; max-height:45vh; border-right:none; border-bottom:1px solid var(--border); }
  .panel-right { min-height:45vh; }
}
</style>
</head>
<body>

<div class="topbar">
  <h1>DoseLab</h1>
  <input type="text" id="searchInput" autofocus>
  <span class="zh-hint" id="zhHint"><span class="arrow">→</span><span id="zhHintText"></span></span>
  <button class="lang-btn" id="langBtn" onclick="toggleLang()" title="Switch language">中</button>
</div>

<div class="layout">
  <div class="panel panel-left" id="resultList">
    <div class="empty-state">
      <div style="font-size:2rem; opacity:0.3;">🔬</div>
      <p id="emptyHint"></p>
    </div>
  </div>
  <div class="panel panel-right">
    <div class="detail-section" id="detailPanel">
      <div class="empty-state"><p id="detailHint"></p></div>
    </div>
    <div class="chart-area" id="chartPanel">
      <canvas id="pkChart"></canvas>
    </div>
    <div class="sim-controls" id="simControls"></div>
    <div class="meta-footer" id="metaFooter"></div>
  </div>
</div>

<script>
const I18N = {
  en: {
    search: 'Search medications (e.g. sertraline, ibuprofen)...',
    searchLabel: 'Search medications...',
    emptyHint: 'Search for a medication to begin',
    detailHint: 'Select a medication to view details',
    noResults: 'No results found',
    searching: 'Searching…',
    medications: 'Medications',
    generic: 'Generic',
    strength: 'Strength',
    dosageForm: 'Dosage form',
    route: 'Route',
    ndc: 'NDC',
    manufacturer: 'Manufacturer',
    category: 'Category',
    halfLife: 'Half‑life',
    tmax: 'T<sub>max</sub>',
    steadyState: 'Steady state',
    pkData: 'PK data',
    loading: 'Loading…',
    dose: 'Dose',
    mgEvery: 'mg every',
    hFor: 'h for',
    h: 'h',
    refresh: 'Refresh',
    therapeuticWindow: 'therapeutic window',
    peak: 'peak',
    doses: 'doses',
    fdaNdc: 'FDA NDC',
    label: 'Label',
    disclaimer: 'Reference only — not medical advice',
    error: 'Error',
    langTitle: 'Switch language',
    langLabel: '中',
    zhMapping: 'matching English term',
  },
  zh: {
    search: '搜索药品（如 sertraline, ibuprofen）…',
    searchLabel: '搜索药品…',
    emptyHint: '搜索药品以开始',
    detailHint: '选择一个药品查看详情',
    noResults: '未找到结果',
    searching: '搜索中…',
    medications: '药品列表',
    generic: '通用名',
    strength: '规格',
    dosageForm: '剂型',
    route: '给药途径',
    ndc: 'NDC 编码',
    manufacturer: '生产厂商',
    category: '上市类别',
    halfLife: '半衰期',
    tmax: '达峰时间 T<sub>max</sub>',
    steadyState: '达稳态',
    pkData: 'PK 数据',
    loading: '加载中…',
    dose: '剂量',
    mgEvery: 'mg 每',
    hFor: 'h 持续',
    h: 'h',
    refresh: '刷新',
    therapeuticWindow: '治疗窗',
    peak: '峰浓度',
    doses: '剂',
    fdaNdc: 'FDA NDC',
    label: '标签',
    disclaimer: '仅供参考 — 非医疗建议',
    error: '错误',
    langTitle: '切换语言',
    langLabel: 'EN',
    zhMapping: '映射到英文词',
  }
};

let locale = 'en';
if (typeof navigator !== 'undefined' && navigator.language?.startsWith('zh')) {
  locale = 'zh';
}
const cache = {};

function t(key) {
  cache[key] ??= {};
  if (!cache[key][locale]) {
    cache[key][locale] = (I18N[locale]?.[key] ?? I18N.en[key] ?? key)
      .replace(/&lt;/g, '<').replace(/&gt;/g, '>');
  }
  return cache[key][locale];
}

function toggleLang() {
  locale = locale === 'en' ? 'zh' : 'en';
  updateAllTexts();
  localStorage?.setItem('doselab-lang', locale);
}
if (typeof localStorage !== 'undefined' && localStorage.getItem('doselab-lang')) {
  locale = localStorage.getItem('doselab-lang');
}

function updateAllTexts() {
  document.getElementById('searchInput').placeholder = t('search');
  document.getElementById('langBtn').textContent = t('langLabel');
  document.getElementById('langBtn').title = t('langTitle');
  document.documentElement.lang = locale;

  const results = window._searchResults;
  if (results) { renderResults(results, window._searchMeta); }
  else {
    document.getElementById('emptyHint').textContent = t('emptyHint');
  }
  if (selectedMed) { renderDetail(selectedMed); }
  else {
    document.getElementById('detailHint').textContent = t('detailHint');
  }
  renderControls();
  drawChart();
}

const FDA_BASE = 'https://api.fda.gov';

let selectedMed = null;
let pkParams = null;
let simHours = 72;
let doseMg = 50;
let intervalHours = 24;
let schedule = [];

const CJK_RE = /[\u4e00-\u9fff\u3400-\u4dbf\uf900-\ufaff]/;
let zhDrugMap = [];

function hasCJK(s) { return CJK_RE.test(s); }

function matchZhToEn(query) {
  if (!query || !zhDrugMap.length) return null;
  const q = query.toLowerCase();
  for (const entry of zhDrugMap) {
    if (!entry.zh) continue;
    for (const name of entry.zh) {
      if (name.includes(q) || q.includes(name)) {
        return { en: entry.en, zh: name, category: entry.category || '' };
      }
    }
  }
  return null;
}

function showZhHint(zhName, enName) {
  const el = document.getElementById('zhHint');
  const txt = document.getElementById('zhHintText');
  if (enName) {
    txt.textContent = `${zhName} → ${enName}`;
    el.classList.add('visible');
  } else {
    el.classList.remove('visible');
  }
}

async function loadZhDrugMap() {
  try {
    const resp = await fetch('data/zh_drug_map.json');
    if (resp.ok) {
      zhDrugMap = await resp.json();
      document.getElementById('searchInput').addEventListener('input', () => {
        const q = document.getElementById('searchInput').value.trim();
        if (hasCJK(q)) {
          const match = matchZhToEn(q);
          showZhHint(match ? match.zh : '', match ? match.en : '');
        } else {
          showZhHint('', '');
        }
      });
    }
  } catch (e) {
    console.warn('Failed to load Chinese drug map:', e.message);
  }
}

function resolveSearchTerm(query) {
  if (hasCJK(query)) {
    const match = matchZhToEn(query);
    if (match) {
      window._zhMatch = match;
      return match.en;
    }
    window._zhMatch = null;
    return query;
  }
  window._zhMatch = null;
  return query;
}

function apiUrl(endpoint, search, limit=20) {
  const q = search ? `search=${encodeURIComponent(search)}` : '';
  return `${FDA_BASE}/${endpoint}?${q}&limit=${limit}&skip=0`;
}

async function fdaFetch(endpoint, search, limit=20) {
  const url = apiUrl(endpoint, search, limit);
  const resp = await fetch(url);
  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    throw new Error(err.error?.message || `HTTP ${resp.status}`);
  }
  const data = await resp.json();
  return {
    results: data.results || [],
    meta: data.meta || {},
    retrieved_at: new Date().toISOString(),
    request_url: url.replace(/(api_key=)[^&]+/, '$1***'),
    endpoint,
    search_query: search,
  };
}

function renderResults(items, meta) {
  const el = document.getElementById('resultList');
  if (!items.length) {
    el.innerHTML = `<div class="empty-state"><p>${t('noResults')}</p></div>`;
    return;
  }
  const total = meta?.results?.total ?? items.length;
  let html = `<div class="section-title">${t('medications')} (${total})</div>`;
  items.forEach((item, i) => {
    const strength = item.active_ingredients?.map(a => a.strength).join(', ') || '';
    const route = (item.route || []).join(', ');
    const form = item.dosage_form || '';
    const active = selectedMed?.product_ndc === item.product_ndc;
    html += `<div class="result-item${active?' active':''}" onclick="selectMed(${i})">
      <div class="brand">${item.brand_name || item.generic_name}</div>
      <div class="generic">${item.generic_name || ''}</div>
      ${strength ? `<div class="strength">${strength}</div>` : ''}
      <div class="meta-row">
        <span>${form}</span><span>${route}</span>
        <span>NDC ${item.product_ndc}</span>
      </div>
    </div>`;
  });
  el.innerHTML = html;
  window._searchResults = items;
}

window.selectMed = async function(idx) {
  const items = window._searchResults || [];
  selectedMed = items[idx];
  if (!selectedMed) return;
  renderResults(items, window._searchMeta);
  renderDetail(selectedMed);
  await fetchLabel(selectedMed);
};

function renderDetail(med) {
  const strength = med.active_ingredients?.map(a => a.strength).join(', ') || '—';
  const route = (med.route || []).join(', ') || '—';
  const el = document.getElementById('detailPanel');
  el.innerHTML = `
    <h3>${med.brand_name || med.generic_name}</h3>
    <div class="detail-row"><span class="label">${t('generic')}</span><span class="value">${med.generic_name || '—'}</span></div>
    <div class="detail-row"><span class="label">${t('strength')}</span><span class="value">${strength}</span></div>
    <div class="detail-row"><span class="label">${t('dosageForm')}</span><span class="value">${med.dosage_form || '—'}</span></div>
    <div class="detail-row"><span class="label">${t('route')}</span><span class="value">${route}</span></div>
    <div class="detail-row"><span class="label">${t('ndc')}</span><span class="value">${med.product_ndc}</span></div>
    <div class="detail-row"><span class="label">${t('manufacturer')}</span><span class="value">${med.labeler_name || '—'}</span></div>
    <div class="detail-row"><span class="label">${t('category')}</span><span class="value">${med.marketing_category || '—'}</span></div>
    ${pkParams ? `
      <div class="detail-row" style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border);">
        <span class="label">${t('halfLife')}</span><span class="value" style="color:var(--primary);">${pkParams.half_life_hours || '—'} h</span>
      </div>
      <div class="detail-row"><span class="label">${t('tmax')}</span><span class="value">${pkParams.tmax_hours || '—'}</span></div>
      <div class="detail-row"><span class="label">${t('steadyState')}</span><span class="value">${pkParams.steady_state || '—'}</span></div>
    ` : `<div class="detail-row"><span class="label" style="color:var(--on-surface-dim);">${t('pkData')}</span><span class="value" style="color:var(--on-surface-dim);">${t('loading')}</span></div>`}
  `;
}

function parsePKFromLabel(labelResult) {
  const label = (labelResult?.results || [])[0];
  if (!label) return null;
  const pk = {};
  const pkText = (label.pharmacokinetics || []).join(' ');
  const cpText = (label.clinical_pharmacology || []).join(' ');

  const halfMatch = pkText.match(/half[- ]life[^0-9]*?(\d+[\.\d]*) to (\d+[\.\d]*)\s*h/i)
    || pkText.match(/half[- ]life[^0-9]*?about\s*(\d+[\.\d]*)\s*h/i)
    || pkText.match(/half[- ]life[^0-9]*?(\d+[\.\d]*)\s*h/i);
  if (halfMatch) {
    pk.half_life_text = halfMatch[0].trim();
    pk.half_life_hours = halfMatch[2] ? (parseFloat(halfMatch[1]) + parseFloat(halfMatch[2])) / 2 : parseFloat(halfMatch[1]);
  }

  const tmaxMatch = pkText.match(/(?:peak|maximum|C\s*max)[^0-9]*?(\d+[\.\d]*)[^0-9]*?(\d+[\.\d]*)?\s*h/i);
  if (tmaxMatch) {
    pk.tmax_text = tmaxMatch[0].trim();
    pk.tmax_hours = tmaxMatch[2] ? `${tmaxMatch[1]}–${tmaxMatch[2]} h` : `${tmaxMatch[1]} h`;
  }

  const ssMatch = pkText.match(/steady[- ]state[^.]*?(\d+[\.\d]*)[^.]*?(day|week|hour)/i);
  if (ssMatch) {
    pk.steady_state = ssMatch[0].trim().replace(/\s+/g,' ');
  }

  pk.label_version = label.version;
  pk.label_effective = label.effective_time;
  pk.brand_name = (label.openfda?.brand_name || [])[0];
  pk.generic_name = (label.openfda?.generic_name || [])[0];
  pk.source_label_id = label.id;
  return pk;
}

async function fetchLabel(med) {
  const searchTerm = med.brand_name_base || med.brand_name || med.generic_name;
  if (!searchTerm) return;
  try {
    const labelEnv = await fdaFetch('drug/label.json', `openfda.brand_name:"${searchTerm}"`, 1);
    pkParams = parsePKFromLabel(labelEnv);
    if (pkParams?.half_life_hours) {
      window._labelMeta = labelEnv.meta;
      window._labelUrl = labelEnv.request_url;
    }
  } catch (e) {
    console.warn('Label fetch failed:', e.message);
    pkParams = null;
  }
  renderDetail(selectedMed);
  renderControls();
  drawChart();
}

function buildDoseSchedule(hours) {
  schedule = [];
  for (let t = 0; t < hours; t += intervalHours) {
    schedule.push({ time: t, dose: doseMg });
  }
}

function concentration(t, halfLife) {
  let c = 0;
  for (const dose of schedule) {
    if (t >= dose.time) {
      c += dose.dose * Math.pow(0.5, (t - dose.time) / halfLife);
    }
  }
  return c;
}

function drawChart() {
  const canvas = document.getElementById('pkChart');
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * window.devicePixelRatio;
  canvas.height = rect.height * window.devicePixelRatio;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = rect.height + 'px';

  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  const halfLife = pkParams?.half_life_hours || 26;
  buildDoseSchedule(simHours);

  const pad = { top: 40, right: 30, bottom: 50, left: 60 };
  const pw = W - pad.left - pad.right;
  const ph = H - pad.top - pad.bottom;

  let maxC = doseMg;
  if (schedule.length > 0) {
    for (let t = 0; t <= simHours; t += 0.2) {
      maxC = Math.max(maxC, concentration(t, halfLife));
    }
  }
  const yMax = maxC * 1.15;

  function tx(t) { return pad.left + (t / simHours) * pw; }
  function ty(c) { return pad.top + (1 - c / yMax) * ph; }

  const tickLines = Math.max(1, Math.floor(simHours / 6));
  ctx.strokeStyle = '#2a2a2a';
  ctx.lineWidth = 1;
  ctx.fillStyle = '#888';
  ctx.font = '11px monospace';
  ctx.textAlign = 'center';
  for (let i = 0; i <= simHours; i += tickLines) {
    const x = tx(i);
    ctx.beginPath(); ctx.moveTo(x, pad.top); ctx.lineTo(x, H - pad.bottom); ctx.stroke();
    ctx.fillText(`${i}h`, x, H - pad.bottom + 16);
  }
  ctx.textAlign = 'right';
  for (let i = 0; i <= 5; i++) {
    const y = ty(yMax * i / 5);
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W - pad.right, y); ctx.stroke();
    ctx.fillText(`${(yMax * i / 5).toFixed(0)}`, pad.left - 6, y + 4);
  }

  if (pkParams?.half_life_hours) {
    const minThera = doseMg * 0.4;
    const maxThera = doseMg * 1.2;
    ctx.fillStyle = 'rgba(76,175,80,0.12)';
    ctx.fillRect(pad.left, ty(maxThera), pw, ty(minThera) - ty(maxThera));
    ctx.setLineDash([4,6]);
    ctx.strokeStyle = 'rgba(76,175,80,0.4)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(pad.left, ty(minThera)); ctx.lineTo(W - pad.right, ty(minThera)); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(pad.left, ty(maxThera)); ctx.lineTo(W - pad.right, ty(maxThera)); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = 'rgba(76,175,80,0.8)';
    ctx.font = '10px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(t('therapeuticWindow'), pad.left + 6, ty(maxThera) - 4);
  }

  schedule.forEach(d => {
    const x = tx(d.time);
    ctx.strokeStyle = 'rgba(144,202,249,0.3)';
    ctx.lineWidth = 1;
    ctx.setLineDash([2,4]);
    ctx.beginPath(); ctx.moveTo(x, pad.top); ctx.lineTo(x, H - pad.bottom); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#90caf9';
    ctx.font = '10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(`${d.dose}mg`, x, H - pad.bottom + 34);
  });

  ctx.strokeStyle = '#90caf9';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  for (let t = 0; t <= simHours; t += 0.2) {
    const x = tx(t);
    const y = ty(concentration(t, halfLife));
    if (t === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.stroke();

  if (schedule.length > 0 && pkParams?.half_life_hours) {
    const lastDose = schedule[schedule.length - 1].time;
    const peakT = lastDose + (pkParams.tmax_hours ? parseFloat(pkParams.tmax_hours) : 5);
    if (peakT <= simHours) {
      const px = tx(peakT), py = ty(concentration(peakT, halfLife));
      ctx.fillStyle = '#ff9800';
      ctx.beginPath(); ctx.arc(px, py, 4, 0, Math.PI*2); ctx.fill();
      ctx.fillText(t('peak'), px + 8, py - 4);
    }
  }

  ctx.fillStyle = '#a0a0a0';
  ctx.font = '11px monospace';
  ctx.textAlign = 'right';
  const curveLabel = (pkParams?.half_life_hours ? `t½ = ${pkParams.half_life_hours}h` : '') + ` | ${schedule.length} ${t('doses')}`;
  ctx.fillText(curveLabel, W - pad.right - 4, pad.top - 8);

  const metaEl = document.getElementById('metaFooter');
  const ndcUpdated = window._searchMeta?.last_updated || '—';
  const labelUpdated = window._labelMeta?.last_updated || '—';
  metaEl.innerHTML = `
    <span title="${window._labelUrl || ''}">${t('fdaNdc')}: ${ndcUpdated}</span>
    <span title="${window._labelUrl || ''}">${t('label')}: ${labelUpdated}</span>
    <span class="source-badge">${t('disclaimer')}</span>
  `;
}

function renderControls() {
  const el = document.getElementById('simControls');
  el.innerHTML = `
    <label>${t('dose')} <input type="number" id="doseInput" value="${doseMg}" min="1" max="2000" onchange="updateSim()"></label>
    <label>${t('mgEvery')} <input type="number" id="intervalInput" value="${intervalHours}" min="1" max="168" onchange="updateSim()"></label>
    <label>${t('hFor')} <input type="number" id="hoursInput" value="${simHours}" min="6" max="336" onchange="updateSim()"></label>
    <label>${t('h')} <button onclick="updateSim()">${t('refresh')}</button></label>
    <span class="source-badge" style="margin-left:auto;">t½ = ${pkParams?.half_life_hours || 26}h</span>
  `;
}

function updateSim() {
  doseMg = parseFloat(document.getElementById('doseInput')?.value) || doseMg;
  intervalHours = parseFloat(document.getElementById('intervalInput')?.value) || intervalHours;
  simHours = parseFloat(document.getElementById('hoursInput')?.value) || simHours;
  drawChart();
}

async function doSearch() {
  const rawQ = document.getElementById('searchInput').value.trim();
  if (!rawQ) return;
  const q = resolveSearchTerm(rawQ);
  const el = document.getElementById('resultList');
  el.innerHTML = `<div class="empty-state"><div class="spinner"></div><p>${t('searching')}</p></div>`;
  try {
    const env = await fdaFetch('drug/ndc.json',
      `brand_name:"${q}"+generic_name:"${q}"`, 20);
    window._searchResults = env.results;
    window._searchMeta = env.meta;
    window._searchUrl = env.request_url;
    renderResults(env.results, env.meta);
    if (env.results.length > 0) {
      selectMed(0);
      drawChart();
    }
  } catch (e) {
    el.innerHTML = `<div class="empty-state"><p style="color:var(--error);">${t('error')}: ${e.message}</p></div>`;
    console.error(e);
  }
}

document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});

window.addEventListener('resize', () => {
  if (selectedMed || window._searchResults?.length) drawChart();
});

loadZhDrugMap();
updateAllTexts();
renderControls();
drawChart();
</script>
</body>
</html>
