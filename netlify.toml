[build]
  base    = "."
  publish = "build/web"
  command = "flutter build web --release --web-renderer canvaskit"

[build.environment]
  FLUTTER_VERSION = "3.22.0"

# Flutter SPA: every unknown path serves index.html
[[redirects]]
  from   = "/*"
  to    = "/index.html"
  status = 200

# Cache CanvasKit & icons aggressively
[[headers]]
  for = "/canvaskit/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache"
